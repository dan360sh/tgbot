<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TG Bot — Вход</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 16px; padding: 40px; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
    h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; }
    p.sub { color: #666; font-size: 14px; margin-bottom: 28px; }
    #qr-box { width: 220px; height: 220px; margin: 0 auto 24px; background: #f5f5f5; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #qr-box img { width: 100%; height: 100%; }
    .loader { width: 36px; height: 36px; border: 3px solid #e0e0e0; border-top-color: #2196F3; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; color: #888; margin-bottom: 20px; min-height: 20px; }
    .status.error { color: #e53935; }
    .twofa { display: none; flex-direction: column; gap: 12px; }
    .twofa input { padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    .twofa input:focus { border-color: #2196F3; }
    .btn { background: #2196F3; color: #fff; border: none; padding: 13px 24px; border-radius: 8px; font-size: 15px; cursor: pointer; width: 100%; }
    .btn:hover { background: #1976D2; }
    .hint { font-size: 13px; color: #aaa; margin-top: 20px; line-height: 1.5; }
  </style>
</head>
<body>
<div class="card">
  <h1>🤖 TG Auto-Bot</h1>
  <p class="sub">Войдите через Telegram, чтобы начать</p>

  <div id="qr-box"><div class="loader"></div></div>
  <p class="status" id="status">Загружаем QR-код...</p>

  <div class="twofa" id="twofa">
    <p style="font-size:14px;color:#555;">Введите пароль 2FA:</p>
    <input type="password" id="twofa-input" placeholder="Пароль облачного пароля" />
    <button class="btn" onclick="submit2fa()">Подтвердить</button>
  </div>

  <p class="hint">Telegram → Настройки → Устройства → Подключить устройство<br>Или нажми <strong>Сканировать QR</strong></p>
</div>

<script>
  let sessionId = null;
  let pollTimer = null;

  async function start() {
    const res = await fetch('/api/auth/qr/start', { method: 'POST' });
    const data = await res.json();
    sessionId = data.sessionId;
    poll();
  }

  async function poll() {
    if (!sessionId) return;
    try {
      const res = await fetch(`/api/auth/qr/poll/${sessionId}`);
      const data = await res.json();

      if (data.qrBase64 && data.status !== 'need_2fa') {
        document.getElementById('qr-box').innerHTML = `<img src="${data.qrBase64}" />`;
        document.getElementById('status').textContent = 'Сканируйте QR-код в Telegram';
        document.getElementById('twofa').style.display = 'none';
      }

      if (data.status === 'need_2fa') {
        document.getElementById('status').textContent = 'Требуется пароль 2FA';
        document.getElementById('twofa').style.display = 'flex';
      } else if (data.status === 'success') {
        localStorage.setItem('tgbot_token', data.token);
        document.getElementById('status').textContent = '✅ Успешно! Перенаправляем...';
        window.location.href = '/dashboard.html';
        return;
      } else if (data.status === 'error') {
        document.getElementById('status').textContent = 'Ошибка: ' + data.error;
        document.getElementById('status').className = 'status error';
        return;
      }
    } catch (e) {
      console.error(e);
    }
    pollTimer = setTimeout(poll, 2000);
  }

  async function submit2fa() {
    const password = document.getElementById('twofa-input').value;
    await fetch(`/api/auth/qr/${sessionId}/2fa`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password }),
    });
    document.getElementById('twofa').style.display = 'none';
    document.getElementById('status').textContent = 'Проверяем пароль...';
    poll();
  }

  start();
</script>
</body>
</html>
