services:
  postgres:
    image: postgres:16
    container_name: tgbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot_secret
      POSTGRES_DB: tgbot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: tgbot-app
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://tgbot:tgbot_secret@postgres:5432/tgbot
    depends_on:
      - postgres

  nginx:
    image: nginx:1.25
    container_name: tgbot-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/nginx:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app

volumes:
  postgres_data:
