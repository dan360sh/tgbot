services:
  postgres:
    image: postgres:16
    container_name: tgbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tgbot
      POSTGRES_PASSWORD: tgbot_secret
      POSTGRES_DB: tgbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
